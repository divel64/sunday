<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday AI Core</title>
    <style>
        body {
            background-color: #0d0d11;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: #13131a;
            border-right: 1px solid #222230;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        .sidebar h3 {
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .history-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        .history-item {
            padding: 10px;
            border-radius: 8px;
            background: #1c1c24;
            margin-bottom: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #cbd5e1;
        }
        .user-profile {
            padding-top: 10px;
            border-top: 1px solid #222230;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        .logout-btn {
            color: #f43f5e;
            text-decoration: none;
            font-weight: bold;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d0d11;
        }
        .chat-header {
            padding: 15px 30px;
            border-bottom: 1px solid #1c1c26;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #4285f4, #9b72cb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .messages-box {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .msg.user {
            background: #1e1e28;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            background: rgba(66, 133, 244, 0.08);
            border: 1px solid rgba(66, 133, 244, 0.2);
            color: #cbd5e1;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .input-wrapper {
            padding: 20px 30px;
            background: #0d0d11;
        }
        .input-area {
            display: flex;
            background: #1e1e24;
            border: 1px solid #2d2d39;
            border-radius: 30px;
            padding: 8px 16px;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: linear-gradient(45deg, #4285f4, #9b72cb);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Chat Streams</h3>
    <div class="history-container" id="historyContainer"></div>
    <div class="user-profile">
        <span>Sir: <strong>{{ username }}</strong></span>
        <a href="/logout" class="logout-btn">Disconnect</a>
    </div>
</div>

<div class="chat-area">
    <div class="chat-header">Sunday AI Terminal Console</div>
    <div class="messages-box" id="messagesBox"></div>
    <div class="input-wrapper">
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Establish connection matrix..." onkeypress="handleKey(event)">
            <button onclick="sendCommand()">Execute</button>
        </div>
    </div>
</div>

<script>
    async function loadHistory() {
        const container = document.getElementById('historyContainer');
        const msgBox = document.getElementById('messagesBox');
        container.innerHTML = "";
        msgBox.innerHTML = "";
        
        try {
            const response = await fetch('/get-history');
            const history = await response.json();
            
            history.forEach(item => {
                if (item.role === 'user') {
                    const hDiv = document.createElement('div');
                    hDiv.className = 'history-item';
                    hDiv.innerText = item.content;
                    container.appendChild(hDiv);
                }
                
                const mDiv = document.createElement('div');
                mDiv.className = `msg ${item.role}`;
                mDiv.innerText = item.content;
                msgBox.appendChild(mDiv);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        } catch (e) { console.error("History engine structural tracking alert.", e); }
    }

    async function sendCommand() {
        const inputField = document.getElementById('userInput');
        const query = inputField.value.trim();
        if (!query) return;

        const msgBox = document.getElementById('messagesBox');
        inputField.value = "";

        const userDiv = document.createElement('div');
        userDiv.className = 'msg user';
        userDiv.innerText = query;
        msgBox.appendChild(userDiv);
        msgBox.scrollTop = msgBox.scrollHeight;

        const botDiv = document.createElement('div');
        botDiv.className = 'msg assistant';
        botDiv.innerText = "Processing vector logs...";
        msgBox.appendChild(botDiv);

        try {
            const formData = new FormData();
            formData.append('message', query);

            const response = await fetch('/ask', { method: 'POST', body: formData });
            const data = await response.json();

            botDiv.innerText = data.text;
            msgBox.scrollTop = msgBox.scrollHeight;

            const audioResponse = await fetch('/get-audio');
            if (audioResponse.ok) {
                const audioBlob = await audioResponse.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio.play();
            }
            
            loadHistory();

        } catch (error) {
            botDiv.innerText = "System interface connectivity breakdown.";
        }
    }

    function handleKey(e) { if (e.key === 'Enter') sendCommand(); }
    window.onload = loadHistory;
</script>

</body>
</html>
